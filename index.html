<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>15パズル</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1>15パズル</h1>
        <p class="app__subtitle">タップ / クリックでタイルを動かして完成を目指そう</p>
      </header>

      <section class="status" aria-live="polite">
        <div><span>手数</span><strong id="moves">0</strong></div>
        <div><span>経過</span><strong id="timer">00:00</strong></div>
      </section>

      <section class="board-wrap">
        <div id="board" class="board" role="grid" aria-label="15パズルの盤面"></div>
      </section>

      <section class="controls">
        <button id="shuffle" type="button">シャッフル</button>
        <button id="reset" type="button">リセット</button>
      </section>

      <p id="message" class="message" role="status"></p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
